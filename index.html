
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Long-form Expert</title>
    <style>
        :root { --primary: #e74c3c; --bg: #f4f7f6; --text: #2d3748; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .voca-container { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); width: 100%; max-width: 650px; } /* 폭을 조금 더 넓힘 */

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 12px; }

        .word-section { text-align: center; margin-bottom: 30px; }
        .word-main { font-size: 3.2rem; font-weight: 800; color: var(--primary); cursor: pointer; }
        .meaning-tag { display: inline-block; background: #fff5f5; color: #c53030; padding: 8px 20px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; margin-top: 15px; }

        /* 장문 예문 카드 스타일 */
        .example-list { margin-top: 25px; display: flex; flex-direction: column; gap: 20px; }
        .example-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }

        .ex-eng { font-size: 1.1rem; color: var(--text); line-height: 1.8; cursor: pointer; margin-bottom: 12px; text-align: justify; padding-right: 25px; }
        .ex-eng b { color: var(--primary); text-decoration: underline; text-underline-offset: 4px; }

        /* 해석 영역 (클릭 시 노출) */
        .ex-kor { font-size: 0.95rem; color: #4a5568; background: #f8fafc; padding: 12px; border-radius: 8px; border-left: 4px solid #cbd5e0; display: none; line-height: 1.6; }

        .btn-show-kor { font-size: 0.8rem; color: #3498db; cursor: pointer; margin-bottom: 10px; display: inline-block; }

        /* 타이핑 테스트 */
        .test-zone { margin-top: 40px; background: #2d3748; padding: 25px; border-radius: 15px; color: white; }
        .typing-input { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 1.3rem; text-align: center; box-sizing: border-box; margin-top: 10px; }
        .typing-input.correct { background: #48bb78; color: white; }

        .btn-next { width: 100%; margin-top: 15px; padding: 20px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: 800; font-size: 1.2rem; cursor: pointer; opacity: 0.3; pointer-events: none; }
        .btn-next.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div class="voca-container">
    <div class="header">
        <span id="wordCounter" style="font-weight: bold;">[ADVANCED TOEIC] 1 / 2</span>
        <span style="font-size: 0.8rem; color: #999;">장문 예문을 끝까지 듣고 따라 읽으세요.</span>
    </div>

    <div class="word-section">
        <div id="wordMain" class="word-main" onclick="speak(this.innerText)">Mandatory</div>
        <div id="meaning" class="meaning-tag">의무적인, 필수의</div>
    </div>

    <div id="exampleList" class="example-list">
        </div>

    <div class="test-zone">
        <div style="font-weight: bold;">SPELLING CHECK</div>
        <input type="text" id="userInput" class="typing-input" placeholder="위 단어를 입력하여 복습을 마칩니다" autocomplete="off" oninput="checkTest()">
        <button id="nextBtn" class="btn-next" onclick="loadNextWord()">PASS TO NEXT (Enter)</button>
    </div>
</div>

<script>
    const vocaData = [
        [
            "Mandatory", "의무적인, 필수의",
            [
                {
                    eng: "The board of directors recently announced that it is <b>mandatory</b> for all senior management personnel to attend the upcoming strategic planning retreat, which aims to address the long-term sustainability of our overseas operations.",
                    kor: "이사회는 최근 해외 사업부의 장기적인 지속 가능성 문제를 다루기 위해 다가오는 전략 기획 수련회에 모든 고위 경영진이 참석하는 것이 의무적이라고 발표했습니다."
                },
                {
                    eng: "In accordance with the new safety regulations, the installation of advanced fire suppression systems has become <b>mandatory</b> for all commercial buildings exceeding ten stories in height to ensure the safety of all occupants.",
                    kor: "새로운 안전 규정에 따라, 모든 거주자의 안전을 보장하기 위해 10층을 초과하는 모든 상업용 건물에 고급 화재 억제 시스템을 설치하는 것이 의무화되었습니다."
                }
            ]
        ],
        [
            "Incentive", "동기, 혜택, 장려금",
            [
                {
                    eng: "To encourage innovation within the organization, the company has implemented a performance-based <b>incentive</b> scheme that rewards employees who develop cost-cutting measures or improve operational efficiency.",
                    kor: "조직 내 혁신을 장려하기 위해, 회사는 비용 절감 방안을 개발하거나 운영 효율성을 개선하는 직원들에게 보상하는 성과 기반 인센티브 제도를 시행했습니다."
                },
                {
                    eng: "Economists argue that the government should provide a substantial tax <b>incentive</b> to corporations that invest heavily in renewable energy research and development to accelerate the transition to a green economy.",
                    kor: "경제학자들은 친환경 경제로의 전환을 가속화하기 위해 재생 에너지 연구 개발에 집중 투자하는 기업들에게 정부가 상당한 세제 혜택을 제공해야 한다고 주장합니다."
                }
            ]
        ]
    ];

    let currentIndex = 0;

    function displayWord() {
        const data = vocaData[currentIndex];
        document.getElementById('wordMain').innerText = data[0];
        document.getElementById('meaning').innerText = data[1];

        const listDiv = document.getElementById('exampleList');
        listDiv.innerHTML = '';

        data[2].forEach((ex, idx) => {
            const card = document.createElement('div');
            card.className = 'example-card';
            card.innerHTML = `
                <div class="ex-eng" onclick="speak(this.innerText)">${ex.eng}</div>
                <div class="btn-show-kor" onclick="toggleKor(${idx})">▼ 해석 보기/숨기기</div>
                <div id="kor-${idx}" class="ex-kor">${ex.kor}</div>
            `;
            listDiv.appendChild(card);
        });

        const input = document.getElementById('userInput');
        input.value = '';
        input.className = 'typing-input';
        document.getElementById('nextBtn').classList.remove('active');
        document.getElementById('wordCounter').innerText = `[ADVANCED TOEIC] ${currentIndex + 1} / ${vocaData.length}`;
        input.focus();
    }

    function toggleKor(idx) {
        const target = document.getElementById(`kor-${idx}`);
        target.style.display = (target.style.display === 'block') ? 'none' : 'block';
    }

    function checkTest() {
        const input = document.getElementById('userInput');
        const target = vocaData[currentIndex][0].toLowerCase();
        if (input.value.toLowerCase() === target) {
            input.className = 'typing-input correct';
            document.getElementById('nextBtn').classList.add('active');
        } else {
            input.className = 'typing-input';
            document.getElementById('nextBtn').classList.remove('active');
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.getElementById('nextBtn').classList.contains('active')) {
            loadNextWord();
        }
    });

    function loadNextWord() {
        currentIndex = (currentIndex + 1) % vocaData.length;
        displayWord();
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'en-US';
        speech.rate = 0.85; // 장문이므로 약간 천천히 읽어줌
        window.speechSynthesis.speak(speech);
    }

    window.onload = displayWord;
</script>
</body>
</html>
