
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily English Conversation - Studio</title>
    <style>
        :root {
            --primary-color: #e74c3c; /* index.html과 톤앤매너 통일 */
            --bg-color: #f8f9fa;
            --a-bubble: #ff6b6b;
            --b-bubble: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }

        .nav-header { width: 100%; max-width: 550px; display: flex; justify-content: flex-start; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #7f8c8d; font-size: 0.9rem; font-weight: bold; }

        .chat-container { width: 100%; max-width: 550px; background: #e5ddd5; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 450px; display: flex; flex-direction: column; overflow-y: auto; }

        .bubble { margin: 12px 0; padding: 14px 18px; border-radius: 18px; font-size: 1.05rem; line-height: 1.5; max-width: 80%; animation: fadeIn 0.5s ease forwards; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .A { background-color: var(--a-bubble); color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .B { background-color: var(--b-bubble); color: #333; align-self: flex-end; border-bottom-right-radius: 2px; text-align: right; }

        .word-badge { background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .control-panel { margin-top: 25px; text-align: center; }
        .replay-btn { padding: 12px 30px; border: none; border-radius: 30px; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .status { margin-top: 15px; font-size: 0.85rem; color: #95a5a6; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← 단어 공부로 돌아가기</a>
    </div>

    <div id="targetWordDisplay" class="word-badge">선택된 단어 없음</div>

    <div class="chat-container" id="chatBox">
        </div>

    <div class="control-panel">
        <button class="replay-btn" onclick="startSelectedScene()">다시 듣기</button>
        <div class="status" id="statusLabel">준비 중...</div>
    </div>

    <script>
        const scenes = {
    'Accommodate': [
        { speaker: 'A', text: "I'm trying to book a table for our group, but can they accommodate 10 people?", kor: "우리 일행을 위해 테이블을 예약하려는데, 10명을 수용할 수 있을까요?" },
        { speaker: 'B', text: "I called them earlier, and they said they can easily accommodate large groups.", kor: "아까 전화해봤는데, 단체 손님도 충분히 수용 가능하다고 했어요." },
        { speaker: 'A', text: "That’s great! I was worried because the restaurant looks a bit small.", kor: "다행이네요! 식당이 좀 작아 보여서 걱정했거든요." },
        { speaker: 'B', text: "Don't worry, they have a spacious private room in the back.", kor: "걱정 마세요, 뒤쪽에 넓은 개인실이 따로 있더라고요." }
    ],
    'Acquisition': [
        { speaker: 'A', text: "Is that a new camera? It looks like a very expensive acquisition.", kor: "그거 새 카메라예요? 아주 비싸게 장만한 물건(습득물) 같아 보이네요." },
        { speaker: 'B', text: "Yes, it’s my latest acquisition for my photography hobby.", kor: "네, 제 사진 취미를 위해 최근에 새로 들인 거예요." },
        { speaker: 'A', text: "The image quality is amazing; you definitely made a good choice.", kor: "화질이 정말 좋네요. 확실히 잘 선택하신 것 같아요." },
        { speaker: 'B', text: "Thanks! I spent weeks reading reviews before buying it.", kor: "고마워요! 사기 전에 몇 주 동안 리뷰를 읽어봤답니다." }

    'Adjourn': [

        { speaker: 'B', text: "I agree. Let’s adjourn and go grab some lunch together.", kor: "동감이에요. 일단 마무리하고 같이 점심 먹으러 가요." },
        { speaker: 'A', text: "Perfect! I know a great sandwich shop just around the corner.", kor: "좋아요! 바로 모퉁이 돌아가면 정말 맛있는 샌드위치 집이 있어요." },
        { speaker: 'B', text: "Sounds like a plan. I’m starving!", kor: "좋은 생각이에요. 저 배고파 죽겠어요!" }
    ],
    'Affordable': [
        { speaker: 'A', text: "I need to find a new apartment, but it's so hard to find something affordable.", kor: "새 아파트를 찾아야 하는데, 가격이 적당한 곳을 찾기가 너무 힘들어요." },
        { speaker: 'B', text: "Have you checked the suburbs? The rent there is much more affordable.", kor: "교외 지역은 확인해 보셨나요? 그쪽 집세가 훨씬 저렴해요." },
        { speaker: 'A', text: "I'll look into it, but I’m worried about the long commute to work.", kor: "한번 알아볼게요, 하지만 출퇴근 시간이 길어질까 봐 걱정되네요." },
        { speaker: 'B', text: "True, but you'll save enough money to buy a comfortable car!", kor: "맞아요, 하지만 편안한 차를 살 수 있을 만큼 돈을 아낄 수 있을 거예요!" }
    ],
    'Ambitious': [
        { speaker: 'A', text: "I heard you're planning to climb Mount Everest next year. That's very ambitious!", kor: "내년에 에베레스트산을 등반할 계획이라고 들었어요. 정말 야심 차네요!" },
        { speaker: 'B', text: "I know, but I’ve always been an ambitious person who loves a challenge.", kor: "알아요, 하지만 전 항상 도전을 즐기는 야심 있는 사람이었거든요." },

    'Appraise': [

        { speaker: 'B', text: "It will be a great place for future generations to learn about them.", kor: "미래 세대들이 그들에 대해 배울 수 있는 좋은 장소가 될 거예요." }
    ],
    'Commitment': [
        { speaker: 'A', text: "Learning a new language requires a huge time commitment, doesn't it?", kor: "외국어를 배우는 건 엄청난 시간적 헌신(전념)이 필요하죠, 그렇죠?" },
        { speaker: 'B', text: "It does, but your commitment will pay off when you travel abroad.", kor: "맞아요, 하지만 당신의 전념은 해외여행을 갈 때 보상받게 될 거예요." },
        { speaker: 'A', text: "I've been practicing every day for an hour.", kor: "매일 한 시간씩 연습하고 있어요." },
        { speaker: 'B', text: "That's the spirit! Consistency is the key to success.", kor: "바로 그 자세예요! 꾸준함이 성공의 열쇠입니다." }
    ],
    'Complimentary': [
        { speaker: 'A', text: "The hotel offered us complimentary breakfast for our entire stay.", kor: "호텔에서 숙박 기간 내내 무료 조식을 제공해 주었어." },

        { speaker: 'A', text: "The food is actually quite good too, not just toast and cereal.", kor: "단순히 토스트랑 시리얼만 있는 게 아니라 음식도 꽤 괜찮아." },
        { speaker: 'B', text: "Let's make sure we wake up early enough to enjoy it tomorrow.", kor: "내일 그거 즐길 수 있게 일찍 일어나도록 하자." }

    'Confidential': [
        { speaker: 'A', text: "Please keep this information confidential; it's not for public release yet.", kor: "이 정보는 기밀로 유지해 주세요. 아직 대중에게 공개할 단계가 아니에요." },
        { speaker: 'B', text: "Don't worry, I understand that this is a confidential matter.", kor: "걱정 마세요, 이것이 기밀 사항이라는 걸 잘 알고 있습니다." },
        { speaker: 'A', text: "If this leaks, it could cause a lot of trouble for the company.", kor: "만약 이게 새어 나가면 회사에 큰 문제가 생길 수 있어요." },
        { speaker: 'B', text: "My lips are sealed. I won't tell a soul.", kor: "입 꼭 다물고 있을게요. 아무에게도 말하지 않을 겁니다." }

        { speaker: 'A', text: "The highway is so congested today. We're barely moving!", kor: "오늘 고속도로가 너무 혼잡하네요. 거의 움직이지를 못하고 있어요!" },
        { speaker: 'B', text: "It’s always congested during rush hour. We should have taken the train.", kor: "퇴근 시간엔 항상 막혀요. 기차를 탔어야 했나 봐요." },
        { speaker: 'A', text: "I think there's an accident up ahead causing the delay.", kor: "앞쪽에 사고가 나서 지체되는 것 같아요." },
        { speaker: 'B', text: "Next time, let's check the traffic app before we leave.", kor: "다음번엔 출발하기 전에 교통 앱을 꼭 확인해 봐요." }
    ],
    'Consecutive': [
        { speaker: 'A', text: "It has been raining for five consecutive days. I miss the sun!", kor: "5일 연속으로 비가 오고 있어요. 태양이 그리워요!" },
        { speaker: 'B', text: "Five consecutive days? That must be a record for this month.", kor: "5일 연속이라고요? 이번 달 들어 기록적이겠는데요." },
        { speaker: 'A', text: "Everything feels so damp and gloomy.", kor: "모든 게 눅눅하고 우울하게 느껴져요." },

        let currentWord = "";
        let isPlaying = false;
        let femaleVoice, maleVoice;

        // 목소리 로딩 및 성별 할당
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Samantha') || v.name.includes('Google US English'));
            maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Alex'));
        }

        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text, speaker, callback) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.voice = (speaker === 'A') ? femaleVoice : maleVoice;
            msg.pitch = (speaker === 'A') ? 1.1 : 0.9;
            msg.onend = callback;
            window.speechSynthesis.speak(msg);
        }

        async function playScene(word) {
            if (!scenes[word] || isPlaying) return;
            isPlaying = true;

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';
            document.getElementById('statusLabel').innerText = "재생 중...";

            for (const line of scenes[word]) {
                const div = document.createElement('div');
                div.className = `bubble ${line.speaker}`;
                div.innerText = `${line.speaker}: ${line.text}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;

                await new Promise(resolve => speak(line.text, line.speaker, resolve));
                await new Promise(resolve => setTimeout(resolve, 600));
            }

            isPlaying = false;
            document.getElementById('statusLabel').innerText = "재생 완료";
        }

        function startSelectedScene() {
            playScene(currentWord);
        }

        // 페이지 로드 시 URL 파라미터 확인
        window.onload = () => {
            loadVoices();
            const urlParams = new URLSearchParams(window.location.search);
            currentWord = urlParams.get('word');

            if (currentWord && scenes[currentWord]) {
                document.getElementById('targetWordDisplay').innerText = `Keyword: ${currentWord}`;
                // 브라우저 정책상 사용자 상호작용 후 소리가 나므로 안내 문구 표시
                document.getElementById('statusLabel').innerText = "화면을 클릭하면 대화가 시작됩니다.";

                // 첫 클릭 시 대화 시작되게 유도
                document.body.addEventListener('click', () => {
                    playScene(currentWord);
                }, { once: true });
            } else {
                document.getElementById('targetWordDisplay').innerText = "단어를 선택해주세요.";
            }
        };
    </script>
